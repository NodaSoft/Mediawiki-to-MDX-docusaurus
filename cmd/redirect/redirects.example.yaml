# Example redirect map generated by the MediaWiki to Docusaurus Redirecter
# This file maps old MediaWiki URLs to new Docusaurus URLs

redirects:
  # Main namespace pages
  Main_Page: /docs/main-page
  Getting_Started: /docs/getting-started
  Installation_Guide: /docs/installation-guide

  # Help namespace
  Help:Contents: /docs/help/contents
  Help:Editing: /docs/help/editing

  # Template namespace
  Template:Warning: /docs/template/warning
  Template:Note: /docs/template/note

  # Category namespace
  Category:Documentation: /docs/category/documentation
  Category:Tutorials: /docs/category/tutorials

  # User namespace
  User:Admin: /docs/user/admin

  # Pages with special characters (Cyrillic example)
  Начало_работы: /docs/nachalo-raboty
  Руководство: /docs/rukovodstvo

# MediaWiki internal redirects (page -> page)
# These are pages that use #REDIRECT [[Target Page]]
wiki_redirects:
  Start: Main Page
  Home: Main Page
  Index: Main Page
  Help: Help:Contents
  Deprecated Feature: New Feature
  Old Article Name: New Article Name
